name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install core + dev dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run unit tests (targeted — excludes integration and heavy bio deps)
        env:
          # Use empty-string sentinel so API-guarded paths fall through to stubs
          OPENGWAS_JWT: ""
          NCBI_API_KEY: ""
          AGENT_MODE: local
        run: |
          python -m pytest \
            tests/test_ota_beta_estimation.py \
            tests/test_ota_gamma_estimation.py \
            tests/test_phase_a_models.py \
            tests/test_phase_b_conditional.py \
            tests/test_phase_c_therapeutic_redirection.py \
            tests/test_phase_d_evidence_disagreement.py \
            tests/test_pipelines.py \
            tests/test_pi_orchestrator_v2.py \
            -q --tb=short -m "not integration"

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff>=0.3.0

      - name: Run ruff (errors only — no auto-fix in CI)
        run: ruff check pipelines/ orchestrator/ mcp_servers/ agents/ models/ config/ --select E,F,W --ignore E501

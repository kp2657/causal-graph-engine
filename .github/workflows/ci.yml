name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Debug environment
        run: |
          python --version
          pip list | grep -E "pytest|kuzu|fastmcp|numpy|pydantic"
          python -c "import sys; print('sys.path:', sys.path)"
          python -c "import pipelines.ota_beta_estimation; print('ota_beta OK')"
          python -c "import pipelines.gps_disease_screen; print('gps_disease OK')"
          python -c "import agents.tier3_causal.causal_filters; print('causal_filters OK')"

      - name: Collect tests (dry run)
        run: |
          python -m pytest \
            tests/test_causal_entropy_filter.py \
            tests/test_causal_pli_penalty.py \
            tests/test_gps_convergence.py \
            tests/test_pipelines.py \
            tests/test_shet_loader.py \
            --collect-only -q 2>&1 || true

      - name: Run unit tests
        run: |
          python -m pytest \
            tests/test_causal_entropy_filter.py \
            tests/test_causal_inherited_genetic_evidence.py \
            tests/test_causal_mechanistic_filter.py \
            tests/test_causal_pareto_cutoff.py \
            tests/test_causal_pli_penalty.py \
            tests/test_causal_program_drivers.py \
            tests/test_gps_branching_probability.py \
            tests/test_gps_convergence.py \
            tests/test_gps_library_overlap.py \
            tests/test_gps_program_signature.py \
            tests/test_scoring_tau_specificity.py \
            tests/test_pipelines.py \
            tests/test_pipelines_new_genomics.py \
            tests/test_pipelines_static_lookups.py \
            tests/test_shet_loader.py \
            tests/test_smr_heidi.py \
            tests/test_finngen_validation.py \
            tests/test_leave_locus_out.py \
            tests/test_program_precedence.py \
            tests/test_clinical_trial_auc.py \
            -v --tb=long 2>&1

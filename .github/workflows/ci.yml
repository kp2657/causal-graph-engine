name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          python -m pytest \
            tests/test_causal_*.py \
            tests/test_gps_*.py \
            tests/test_scoring_*.py \
            tests/test_pipelines*.py \
            tests/test_shet_loader.py \
            tests/test_smr_heidi.py \
            tests/test_finngen_validation.py \
            tests/test_leave_locus_out.py \
            tests/test_program_precedence.py \
            tests/test_clinical_trial_auc.py \
            -q --tb=short
